name: Bug Report
description: Found an issue?
title: "bug: lorem ipsum dolor"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Please fill in this form to help us get a better understanding of the bug you're encountering

  - type: textarea
    id: description
    attributes:
      label: What issue are you encountering?
      placeholder: e.g. the game rickrolls me everytime I get a new mention
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Do this
        2. Go there
        3. Scroll down here
        4. Click that
        5. You get rickrolled now on mention
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: TO NOT GET RICKROLLED YOU DUMMY
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: CommentMentions version
      placeholder: v1.0.0-beta.4
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Geode version
      placeholder: v5.6.1
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. iOS 26.4.2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Game logs/Crash logs (optional, required if crash)
      description: Please only show logs relevant to the issue
      render: shell

  - type: checkboxes
    id: more-stuff
    attributes:
      label: Verifications
      options:
        - label: I can confirm this issue is related specifically to CommentMentions, and not another Geode mod, or Geode itself
          required: true